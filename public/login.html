<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英语快速学习小课堂</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1f10;
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        overflow: hidden;
        position: relative;
      }

      /* 动态背景渐变 */
      .bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 20% 20%, #1a4d26 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 80%, #0f3318 0%, transparent 60%),
                    radial-gradient(ellipse at 60% 10%, #2d6b38 0%, transparent 50%),
                    #0d1f10;
        z-index: 0;
      }

      /* 漂浮光圈动画 */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.25;
        animation: float linear infinite;
        z-index: 0;
        pointer-events: none;
      }
      .orb-1 { width: 400px; height: 400px; background: #2f8a43; top: -100px; left: -100px; animation-duration: 18s; }
      .orb-2 { width: 300px; height: 300px; background: #67c85d; bottom: -80px; right: -80px; animation-duration: 22s; animation-delay: -8s; }
      .orb-3 { width: 200px; height: 200px; background: #4aab5a; top: 40%; left: 60%; animation-duration: 15s; animation-delay: -5s; }

      @keyframes float {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(30px, -20px) scale(1.05); }
        50%  { transform: translate(15px, 30px) scale(0.97); }
        75%  { transform: translate(-20px, 10px) scale(1.03); }
        100% { transform: translate(0, 0) scale(1); }
      }

      /* 小粒子 */
      .particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .dot {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #67c85d;
        opacity: 0;
        animation: rise linear infinite;
      }
      @keyframes rise {
        0%   { transform: translateY(0) scale(0); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.3; }
        100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
      }

      /* 主卡片 */
      .card {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(103, 200, 93, 0.2);
        border-radius: 24px;
        padding: 48px 44px 44px;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 0 0 1px rgba(103, 200, 93, 0.08),
          0 24px 64px rgba(0, 0, 0, 0.5),
          0 0 80px rgba(47, 138, 67, 0.15);
        text-align: center;
        animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(32px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Logo 圆形 */
      .logo-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        height: 68px;
        border-radius: 20px;
        background: linear-gradient(135deg, #2f8a43, #67c85d);
        box-shadow: 0 8px 28px rgba(47, 138, 67, 0.5), 0 0 0 8px rgba(103, 200, 93, 0.12);
        margin-bottom: 24px;
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 8px 28px rgba(47,138,67,0.5), 0 0 0 8px rgba(103,200,93,0.12); }
        50%       { box-shadow: 0 8px 28px rgba(47,138,67,0.7), 0 0 0 14px rgba(103,200,93,0.06); }
      }
      .logo-text {
        font-size: 26px;
        font-weight: 900;
        color: #fff;
        letter-spacing: -1px;
      }

      /* 标题区域 */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(103, 200, 93, 0.15);
        border: 1px solid rgba(103, 200, 93, 0.3);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
        color: #67c85d;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 26px;
        font-weight: 800;
        color: #f0faf0;
        line-height: 1.3;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }

      .sub {
        font-size: 13px;
        color: rgba(200, 230, 200, 0.6);
        margin-bottom: 32px;
        line-height: 1.6;
      }

      /* 错误提示 */
      #cf-access-error {
        color: #ff8a6b;
        font-size: 13px;
        margin-bottom: 10px;
        min-height: 0;
      }

      /* 表单容器 */
      #cf-login-form { text-align: left; }

      /* 强制覆盖 Cloudflare 注入的表单样式 */
      #cf-login-form label,
      .cf-login-form label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: rgba(200, 230, 200, 0.7);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      #cf-login-form input[type="email"],
      .cf-login-form input[type="email"] {
        width: 100%;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(103, 200, 93, 0.25);
        border-radius: 12px;
        padding: 13px 16px;
        font-size: 14px;
        color: #f0faf0;
        outline: none;
        margin-bottom: 14px;
        transition: border-color 200ms, background 200ms, box-shadow 200ms;
      }
      #cf-login-form input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }
      #cf-login-form input[type="email"]:focus {
        border-color: #67c85d;
        background: rgba(103,200,93,0.08);
        box-shadow: 0 0 0 3px rgba(103,200,93,0.15);
      }

      #cf-login-form button[type="submit"],
      #cf-login-form input[type="submit"],
      .cf-login-form button[type="submit"],
      .cf-login-form input[type="submit"] {
        width: 100%;
        background: linear-gradient(135deg, #2f8a43, #4aab5a);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 150ms, box-shadow 150ms;
        box-shadow: 0 6px 20px rgba(47,138,67,0.4);
        letter-spacing: 0.3px;
      }
      #cf-login-form button[type="submit"]:hover,
      #cf-login-form input[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(47,138,67,0.5);
      }
      #cf-login-form button[type="submit"]:active,
      #cf-login-form input[type="submit"]:active {
        transform: translateY(0);
      }

      /* 分隔线 */
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0 16px;
        color: rgba(200,230,200,0.3);
        font-size: 11px;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(103,200,93,0.15);
      }

      /* 底部 */
      .footer {
        margin-top: 28px;
        font-size: 11px;
        color: rgba(200,230,200,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .footer a { color: rgba(103,200,93,0.5); text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <!-- 漂浮光圈 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- 粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 登录卡片 -->
    <div class="card">
      <div class="logo-wrap">
        <span class="logo-text">EN</span>
      </div>

      <div class="badge">🚀 Daily English · AI Powered</div>

      <h1>英语快速学习小课堂</h1>
      <p class="sub">每天 20 分钟，AI 陪你把英语用起来</p>

      <!-- Cloudflare Access 错误注入点 -->
      <div id="cf-access-error"></div>

      <!-- Cloudflare Access 登录表单注入点 -->
      <div id="cf-login-form"></div>

      <div class="footer">
        <span>🔒 由 Cloudflare Zero Trust 安全保障</span>
      </div>
    </div>

    <script>
      // 生成上升粒子
      const container = document.getElementById('particles');
      for (let i = 0; i < 24; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.bottom = '-10px';
        dot.style.width = dot.style.height = (2 + Math.random() * 4) + 'px';
        dot.style.animationDuration = (8 + Math.random() * 14) + 's';
        dot.style.animationDelay = (-Math.random() * 20) + 's';
        dot.style.opacity = '0';
        container.appendChild(dot);
      }
    </script>
  </body>
</html>
